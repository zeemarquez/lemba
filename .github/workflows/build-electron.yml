name: Build Electron Apps

on:
  # Trigger on version tags
  push:
    tags:
      - 'v*'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish to GitHub Releases'
        required: false
        default: 'true'
        type: boolean

# Cancel in-progress runs for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build

      - name: Build Electron app (macOS)
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-macos
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn
          retention-days: 7

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')

    permissions:
      contents: write

    steps:
      - name: Checkout repository (for tag info)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: electron-macos
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/ || echo "No artifacts found"

      - name: Extract tag name
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
          else
            # For manual dispatch, get version from metadata
            if [ -f build-metadata.json ]; then
              TAG_NAME="v$(node -p "require('./build-metadata.json').version")"
            else
              TAG_NAME=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
            fi
          fi
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Tag name: $TAG_NAME"

      - name: Create GitHub Release in Public Repo
        uses: softprops/action-gh-release@v2
        with:
          repo: zeemarquez/modern-markdown-landing-page
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            ## Modern Markdown Editor ${{ steps.tag.outputs.tag }}
            
            This release contains the macOS build artifacts for Modern Markdown Editor.
            
            **Note:** Windows builds are available separately and should be uploaded manually to this release.
            
            ### Downloads
            - macOS DMG and ZIP files are attached below
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
